{{- define "cqrs.connectionString" -}}
Server={{ $.Values.sql.host }},{{ $.Values.sql.port }};Database={{ . }};User Id={{ $.Values.sql.user }};Password={{ $.Values.sql.password }};TrustServerCertificate=True;
{{- end }}

{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/part-of: cqrs-demo
spec:
  replicas: {{ $svc.replicas | default $.Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        tier: app
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $svc.image }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            {{- if eq $svc.kind "api" }}
            - containerPort: {{ $svc.port }}
            {{- end }}
          env:
            - name: ASPNETCORE_URLS
              value: http://+:{{ default 8080 $svc.port }}
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.sql.passwordSecret }}
                  key: {{ $.Values.sql.passwordKey }}
            - name: Kafka__BootstrapServers
              value: {{ $.Values.kafka.bootstrapServers | quote }}
            - name: Kafka__TopicName
              value: {{ $.Values.kafka.topicName | quote }}
            - name: Elasticsearch__Url
              value: {{ $.Values.elasticsearch.url | quote }}
            - name: Observability__OtlpEndpoint
              value: {{ $.Values.observability.otlpEndpoint | quote }}
            - name: Observability__ElasticsearchUrl
              value: {{ $.Values.elasticsearch.url | quote }}
            {{- if $svc.writeDb }}
            - name: ConnectionStrings__WriteDb
              value: {{ include "cqrs.connectionString" $svc.writeDb | quote }}
            {{- end }}
            {{- if $svc.readDb }}
            - name: ConnectionStrings__ReadDb
              value: {{ include "cqrs.connectionString" $svc.readDb | quote }}
            {{- end }}
            {{- range $key, $value := default dict $svc.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := default dict $svc.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              memory: {{ dig "resources" "requests" "memory" "128Mi" $svc }}
              cpu: {{ dig "resources" "requests" "cpu" "100m" $svc }}
            limits:
              memory: {{ dig "resources" "limits" "memory" "512Mi" $svc }}
              cpu: {{ dig "resources" "limits" "cpu" "500m" $svc }}
{{- if eq $svc.kind "api" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
{{- end }}
