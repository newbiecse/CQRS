{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-initializer
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-sql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.sql.host }} {{ .Values.sql.port }}; do
                echo "waiting for sqlserver..."
                sleep 5
              done
      containers:
        - name: db-initializer
          image: "{{ .Values.dbInit.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SQL_HOST
              value: {{ .Values.sql.host | quote }}
            - name: SQL_PORT
              value: {{ .Values.sql.port | quote }}
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sql.passwordSecret }}
                  key: {{ .Values.sql.passwordKey }}
{{- end }}
