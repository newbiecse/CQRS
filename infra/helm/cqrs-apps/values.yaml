namespace: cqrs-demo

image:
  registry: cqrsdemo
  tag: latest
  pullPolicy: IfNotPresent

sql:
  host: sqlserver
  port: 1433
  user: sa
  password: Your_password123
  passwordSecret: cqrs-secrets
  passwordKey: MSSQL_SA_PASSWORD

kafka:
  bootstrapServers: kafka:9092
  topicName: shop-events

elasticsearch:
  url: http://elasticsearch:9200

observability:
  otlpEndpoint: http://otel-collector:4317

dbInit:
  enabled: true
  image: cqrsdemo/db-initializer

ingress:
  enabled: true
  className: nginx
  shopGatewayHost: shop.local
  adminApiHost: admin-api.local
  shopFrontendHost: shop-fe.local

services:
  - name: shop-gateway
    image: shop-gateway
    kind: api
    port: 8080
    env:
      ASPNETCORE_ENVIRONMENT: Kubernetes
  - name: shop-admin-api
    image: shop-admin-api
    kind: api
    port: 8080
    env:
      ASPNETCORE_ENVIRONMENT: Kubernetes
  - name: product-commands
    image: product-commands
    kind: api
    port: 8080
    writeDb: CqrsDemo_Product_Write
  - name: product-queries
    image: product-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_Product_Read
  - name: product-projection-worker
    image: product-projection-worker
    kind: worker
    readDb: CqrsDemo_Product_Read
  - name: cart-commands
    image: cart-commands
    kind: api
    port: 8080
    writeDb: CqrsDemo_Cart_Write
  - name: cart-queries
    image: cart-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_Cart_Read
  - name: cart-projection-worker
    image: cart-projection-worker
    kind: worker
    readDb: CqrsDemo_Cart_Read
  - name: order-commands
    image: order-commands
    kind: api
    port: 8080
    writeDb: CqrsDemo_Order_Write
  - name: order-queries
    image: order-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_Order_Read
  - name: order-projection-worker
    image: order-projection-worker
    kind: worker
    readDb: CqrsDemo_Order_Read
  - name: order-integration-worker
    image: order-integration-worker
    kind: worker
    readDb: CqrsDemo_Order_Read
  - name: payment-commands
    image: payment-commands
    kind: api
    port: 8080
    writeDb: CqrsDemo_Payment_Write
    extraEnv:
      OrderService__BaseUrl: http://order-queries:8080
  - name: payment-queries
    image: payment-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_Payment_Read
  - name: payment-projection-worker
    image: payment-projection-worker
    kind: worker
    readDb: CqrsDemo_Payment_Read
  - name: user-commands
    image: user-commands
    kind: api
    port: 8080
    writeDb: CqrsDemo_User_Write
  - name: user-queries
    image: user-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_User_Read
  - name: user-projection-worker
    image: user-projection-worker
    kind: worker
    readDb: CqrsDemo_User_Read
  - name: reporting-queries
    image: reporting-queries
    kind: api
    port: 8080
    readDb: CqrsDemo_Reporting
  - name: reporting-projection-worker
    image: reporting-projection-worker
    kind: worker
    readDb: CqrsDemo_Reporting
  - name: checkout-saga-api
    image: checkout-saga-api
    kind: api
    port: 8080
  - name: checkout-saga-worker
    image: checkout-saga-worker
    kind: worker
  - name: audit-projection-worker
    image: audit-projection-worker
    kind: worker

frontends:
  - name: shop
    image: shop
    port: 3000
    env:
      GATEWAY_URL: http://shop-gateway:8080