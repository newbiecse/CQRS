apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cqrs-demo-prod

resources:
  - ../../base

patches:
  - path: patches/secret-patch.yaml
    target:
      kind: Secret
      name: cqrs-demo-secrets
  - path: patches/namespace.yaml
    target:
      kind: Namespace
      name: cqrs-demo
