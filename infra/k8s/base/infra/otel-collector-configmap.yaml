apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: cqrs-demo
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      elasticsearch:
        endpoints:
          - http://elasticsearch:9200
        logs_index: app-logs-otel
        traces_index: app-traces
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [elasticsearch]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [elasticsearch]
