name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & build
        run: |
          dotnet restore backend/CqrsDemo.Distributed.sln
          dotnet build backend/CqrsDemo.Distributed.sln -c Release --no-restore
          dotnet build backend/tools/CqrsDemo.DatabaseInitializer/CqrsDemo.DatabaseInitializer.csproj -c Release

  frontend-admin:
    name: Build admin frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install & build
        working-directory: frontend/admin
        env:
          CI: true
        run: |
          npm ci --ignore-scripts
          npm run build

  frontend-shop:
    name: Build shop frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/shop/package-lock.json

      - name: Install & build
        working-directory: frontend/shop
        env:
          CI: true
        run: |
          npm ci
          npm run build

  docker-images:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify image manifest
        run: test -f infra/docker/images.manifest.json

      - name: Build images (smoke)
        env:
          REGISTRY: cqrsdemo
          TAG: ci-${{ github.sha }}
        run: |
          chmod +x scripts/build-container-images.sh
          ./scripts/build-container-images.sh

      - name: Verify image tags
        env:
          TAG: ci-${{ github.sha }}
        run: |
          docker image inspect "cqrsdemo/shop-gateway:${TAG}"
          docker image inspect "cqrsdemo/shop:${TAG}"
